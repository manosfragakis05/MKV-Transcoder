<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!--script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKV Hardware Transcoder</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .converter-card {
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            /* Widened from 400px so the video looks good */
            text-align: center;
        }

        h2 {
            margin-top: 0;
        }

        input[type="file"] {
            margin: 1.5rem 0;
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 6px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
            color: #888;
        }

        button:hover:not(:disabled) {
            background: #0056b3;
        }

        progress {
            width: 100%;
            height: 8px;
            margin-top: 1.5rem;
            border-radius: 4px;
            appearance: none;
        }

        progress::-webkit-progress-bar {
            background-color: #333;
            border-radius: 4px;
        }

        progress::-webkit-progress-value {
            background-color: #007bff;
            border-radius: 4px;
        }

        #statusText {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #aaa;
        }

        /* THE NEW VIDEO PLAYER */
        video {
            width: 100%;
            margin-top: 1.5rem;
            border-radius: 8px;
            background: #000;
            display: none;
            /* Hidden by default */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        #downloadBtn {
            display: none;
            background: #28a745;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            margin-top: 1.5rem;
        }

        #downloadBtn:hover {
            background: #218838;
        }
    </style>
</head>

<body>

    <div class="converter-card">
        <h2>MKV Transcoder Engine</h2>
        <p style="color: #888; font-size: 0.9rem;">Hardware-accelerated Dolby to AAC</p>

        <label for="localFileInput" style="font-weight: bold; font-size: 0.9rem; color: #ccc;">📁 Select Local
            File:</label>
        <input type="file" id="localFileInput" accept=".mkv"
            style="width: 100%; padding: 10px; margin: 0.5rem 0 1.5rem 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px;">

        <div style="color: #666; font-size: 0.8rem; margin-bottom: 1rem;">— OR —</div>

        <input type="url" id="urlInput" placeholder="Paste Torbox direct link here..."
            style="width: 100%; padding: 10px; margin: 1.5rem 0; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 6px;">
        <button id="startBtn">Start Player</button>

        <progress id="progressBar" value="0" max="100"></progress>
        <div id="statusText">Awaiting file...</div>

        <div id="trackControls"
            style="display: none; margin-top: 1rem; background: #2a2a2a; padding: 10px; border-radius: 6px; text-align: left;">
            <label for="audioSelect" style="font-weight: bold; margin-right: 10px;">🎧 Audio Track:</label>
            <select id="audioTrackSelect"
                style="background: #1e1e1e; color: white; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
            </select>
        </div>

        <video id="videoPlayer" playsinline controls></video>

        <a id="downloadBtn" href="#">⬇️ Save MP4 to Device</a>
    </div>

    <script type="module">
        import { MKVPlayer } from './mkv_lib.js';

        const videoElement = document.getElementById('videoPlayer');
        const player = new MKVPlayer(videoElement);

        // Boot Button
        document.getElementById('startBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('localFileInput').files[0];
            const urlInput = document.getElementById('urlInput').value;

            const targetSource = fileInput ? fileInput : urlInput;

            if (!targetSource) {
                alert("Please select a file or paste a link first!");
                return;
            }

            await player.load(targetSource);

            videoElement.style.display = 'block';
            document.getElementById('trackControls').style.display = 'block';
            document.getElementById('downloadBtn').style.display = 'block';

            player.play();

            // Populate your Audio UI
            const tracks = player.getAudioTracks();
            const select = document.getElementById('audioTrackSelect');
            select.innerHTML = '';
            tracks.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.track_number;
                opt.innerText = `Track ${t.track_number}: ${t.codec_id} (${t.language})`;
                select.appendChild(opt);
            });
        });

        // Audio Dropdown
        document.getElementById('audioTrackSelect').addEventListener('change', (e) => {
            player.setAudioTrack(e.target.value);
        });

        downloadBtn.addEventListener('click', () => {
            player.toggleRecording(
                // 1. The onStateChange Callback
                (state) => {
                    if (state === "recording") {
                        videoElement.style.opacity = "0.2";
                        videoElement.style.pointerEvents = "none";

                        downloadBtn.style.background = "#ff4444";
                    } else if (state === "stopped") {
                        videoElement.style.opacity = "1";
                        videoElement.style.pointerEvents = "auto";

                        downloadBtn.innerText = "⬇ Save MP4 to Device";
                        downloadBtn.style.background = "#28a745";
                    }
                },
                // 2. The onProgress Callback
                (percent) => {
                    downloadBtn.innerText = `🛑 Stop (${percent}%)`;
                    downloadBtn.style.background = `linear-gradient(90deg, #ff4444 ${percent}%, #444444 ${percent}%)`;
                }
            );
        });
    </script>
</body>

</html>
